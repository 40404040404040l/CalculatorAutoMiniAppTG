<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Таможенный калькулятор</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Таможенный калькулятор</h1>

      <section class="card">
        <h2>Входные данные</h2>
        <div class="grid">
          <label>Цена с вычетом НДС
            <input id="price" type="number" step="0.01" value="120000" />
          </label>
          <label>Объем (см3)
            <input id="engine" type="number" step="1" value="2999" />
          </label>
          <label>Год выпуска авто
            <input id="year" type="number" step="1" value="2026" />
          </label>
          <label>Лошадиные силы
            <input id="hp" type="number" step="1" value="387" />
          </label>
          <label>Брокеры/стоянка/прочие
            <input id="customCosts" type="number" step="0.01" value="1500" />
          </label>
          <label>Перевод денег + оплата с фирмы
            <input id="transferCosts" type="number" step="0.01" value="0" />
          </label>
          <label>Доставка до Питера/Мск
            <input id="delivery" type="number" step="0.01" value="5000" />
          </label>
          <label>Курс валюты
            <input id="rate" type="number" step="0.01" value="93.5" />
          </label>
        </div>
      </section>

      <section class="card">
        <h2>Результат</h2>
        <div class="result-list">
          <div><span>Таможенная пошлина:</span><strong id="duty">0</strong></div>
          <div><span>Утильсбор:</span><strong id="recycling">0</strong></div>
          <div><span>Цена под ключ (валюта):</span><strong id="turnkey">0</strong></div>
          <div><span>В рублях:</span><strong id="rub">0</strong></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
